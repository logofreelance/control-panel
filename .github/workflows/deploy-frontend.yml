name: Deploy Frontend Control Panel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend-control-panel/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Nuxt to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        run: npx turbo run build:cloudflare --filter=dashboard

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/frontend-control-panel/.open-next --project-name=lfengine
